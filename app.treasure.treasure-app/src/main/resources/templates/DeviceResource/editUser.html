{#include main.html}
    {#title}Edit device{/title}
    <div class="breadcrumb">
      <a href="/devices">Devices</a>
      <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
      </svg>
      {device.deviceName}
        <svg width="12" height="12" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7"/>
        </svg>
        <span>Edit</span>
    </div>
    <div class="page-header">
      <div class="page-title">Edit device name</div>
      <div class="page-subtitle">Editing: {device.deviceName}</div>
    </div>
    <form method="post" action="/devices/{device.id}/update">
            {#authenticityToken /}
            <div class="form-card">
              <div class="form-card-header">
                <div class="form-card-icon">
                  <svg width="21" height="21" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/>
                  </svg>
                </div>
                <div class="form-card-header-text">
                  <h3>Device details</h3>
                  <p>Fill in the information</p>
                </div>
              </div>
        <div class="form-body">
          <div class="field">
            <div class="current-label">Current name</div>
            <div class="current-value">
              <svg width="17" height="17" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M8 21h8M12 17v4"/></svg>
              {device.deviceName}
            </div>
          </div>
          <div class="field">
            <label class="field-label">Device name <span class="required">*</span></label>
            <input class="field-input" type="text" maxlength="50" name="deviceName" placeholder="e.g. MacBook Pro 14&quot;" id="nameInput" oninput="validate()" value="{device.deviceName}">
            <span class="field-error" id="nameError" style="display:none">
              <svg width="11" height="11" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><circle cx="12" cy="12" r="10"/><path stroke-linecap="round" d="M12 8v4m0 4h.01"/></svg>
              Device name cannot be empty
            </span>
          </div>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-save" onclick="return handleSave()">
            <svg width="17" height="17" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7"/>
            </svg>
            Save device
          </button>
          <button type="button" class="btn-cancel" onclick="history.back()">Cancel</button>
          <span class="btn-save-hint">Fields marked * are required</span>
        </div>
      </div>
    </form>
{/include}
